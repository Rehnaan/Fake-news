<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fake News Detection</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: linear-gradient(135deg,#1e3c72,#2a5298);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:700px;
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0px 10px 30px rgba(0,0,0,0.3);
            text-align:center;
        }

        h1{
            color:#1e3c72;
            margin-bottom:10px;
        }

        p{
            color:gray;
            margin-bottom:20px;
        }

        textarea{
            width:100%;
            height:180px;
            padding:15px;
            border:2px solid #ddd;
            border-radius:10px;
            resize:none;
            font-size:16px;
        }

        button{
            margin-top:20px;
            width:100%;
            padding:15px;
            background:#1e3c72;
            color:white;
            border:none;
            border-radius:10px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#2a5298;
        }

        .result{
            margin-top:25px;
            padding:15px;
            background:#f4f4f4;
            border-radius:10px;
            font-size:22px;
            font-weight:bold;
        }

        .footer{
            margin-top:20px;
            color:gray;
            font-size:14px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>📰 Fake News Detection System</h1>

    <p>Enter a news article and check whether it is Fake or Real using Machine Learning.</p>

    <form action="/predict" method="POST">

        <textarea
            name="news"
            placeholder="Paste news article here..."
            required></textarea>

        <button type="submit">
            🔍 Check News
        </button>

    </form>

    {% if prediction %}
    <div class="result">
        Prediction: {{ prediction }}
    </div>
    {% endif %}

    <div class="footer">
        Developed using Flask, TF-IDF & Random Forest Classifier
    </div>

</div>

</body>
</html>
